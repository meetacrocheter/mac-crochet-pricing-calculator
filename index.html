<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaC Crochet Pricing Calculator Pro</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 720px;
  margin: auto;
  background: #fff;
  padding: 22px;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.lang {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.lang button {
  padding: 6px 12px;
  border: 1px solid #ddd;
  background: #fafafa;
  border-radius: 6px;
  cursor: pointer;
}

h2 {
  margin-top: 10px;
}

label {
  display: block;
  margin-top: 14px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.info {
  font-size: 12px;
  color: gray;
}

.section {
  margin-top: 18px;
  padding: 15px;
  background: #f9f9f9;
  border-radius: 10px;
}

.result {
  background: #fff;
  border: 2px solid #eee;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
  min-height: 90px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.save { background: #6a0dad; color: white; }
.share { background: #25D366; color: white; }
.download { background: #2ecc71; color: white; }
.feedback { background: #444; color: white; }

a {
  display: block;
  margin-top: 8px;
  color: #128C7E;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
</div>

<h2 id="title"></h2>

<label id="currencyLabel"></label>
<input id="currency">
<div class="info" id="currencyInfo"></div>

<label id="skillLabel"></label>
<select id="skill">
<option value="1000"></option>
<option value="1500"></option>
<option value="2500"></option>
<option value="3500"></option>
<option value="5000"></option>
</select>
<div class="info" id="skillInfo"></div>

<label id="rateLabel"></label>
<input id="rate">

<label id="productLabel"></label>
<input id="product">

<label id="yarnLabel"></label>
<input id="yarn">

<label id="matLabel"></label>
<input id="materials">

<label id="hoursLabel"></label>
<input id="hours">

<label id="overheadLabel"></label>
<input id="overhead" value="10">

<div class="section">
<div class="result" id="output">
</div>
</div>

<button class="save" id="saveBtn"></button>
<button class="download" id="downloadBtn"></button>
<button class="share" id="shareBtn"></button>

</div>

<!-- 💬 REVIEW + FEEDBACK -->
<div class="container section">

<h3 id="feedbackTitle"></h3>
<p id="feedbackText"></p>

<textarea id="feedbackBox" placeholder=""></textarea>

<button class="feedback" id="waFeedback"></button>
<button class="feedback" id="emailFeedback"></button>

</div>

<!-- 🌍 COMMUNITY -->
<div class="container section">

<h3 id="communityTitle"></h3>
<p id="communityText"></p>

<a href="#">👉 Discussion Group 1</a>
<a href="#">👉 Discussion Group 2</a>
<a href="#">👉 Vendor Marketplace</a>

</div>

<script>
let lang = "en";

const t = {

en: {
title:"🧶 MaC Crochet Pricing Calculator Pro",
currencyLabel:"Currency",
currencyInfo:"Enter any currency symbol or name",
skillLabel:"Skill Level",
skillInfo:"Recommended rate adjusts automatically",
rateLabel:"Hourly Rate",
productLabel:"Product Name",
yarnLabel:"Yarn Cost",
matLabel:"Other Materials",
hoursLabel:"Hours Spent",
overheadLabel:"Overhead %",
saveBtn:"Save Product",
downloadBtn:"Download Result",
shareBtn:"Share",
feedbackTitle:"💬 Review & Feedback",
feedbackText:"Tell us how this tool is helping you and what can be improved. Your feedback helps us improve this calculator for other crocheters.",
feedbackBtn1:"Send via WhatsApp",
feedbackBtn2:"Send via Email",
communityTitle:"🌍 Community",
communityText:"Join other crocheters like you who are using this calculator and growing their businesses",
empty:"Enter values to calculate pricing"
},

fr: {
title:"🧶 Calculateur de Prix Crochet MaC Pro",
currencyLabel:"Devise",
currencyInfo:"Entrez une devise ou symbole",
skillLabel:"Niveau",
skillInfo:"Tarif recommandé selon votre niveau",
rateLabel:"Tarif horaire",
productLabel:"Nom du produit",
yarnLabel:"Coût du fil",
matLabel:"Autres matériaux",
hoursLabel:"Heures travaillées",
overheadLabel:"Frais généraux %",
saveBtn:"Enregistrer",
downloadBtn:"Télécharger",
shareBtn:"Partager",
feedbackTitle:"💬 Avis & Suggestions",
feedbackText:"Dites-nous comment cet outil vous aide et ce qui peut être amélioré. Votre retour nous aide à améliorer ce calculateur pour d'autres crocheteurs.",
feedbackBtn1:"Envoyer via WhatsApp",
feedbackBtn2:"Envoyer par Email",
communityTitle:"🌍 Communauté",
communityText:"Rejoignez d'autres crocheteurs qui utilisent ce calculateur et développent leur activité",
empty:"Entrez les valeurs pour calculer"
}
};

function setLang(l){
lang = l;
apply();
}

function apply(){

let L = t[lang];

document.getElementById("title").innerText = L.title;
document.getElementById("currencyLabel").innerText = L.currencyLabel;
document.getElementById("currencyInfo").innerText = L.currencyInfo;
document.getElementById("skillLabel").innerText = L.skillLabel;
document.getElementById("skillInfo").innerText = L.skillInfo;
document.getElementById("rateLabel").innerText = L.rateLabel;
document.getElementById("productLabel").innerText = L.productLabel;
document.getElementById("yarnLabel").innerText = L.yarnLabel;
document.getElementById("matLabel").innerText = L.matLabel;
document.getElementById("hoursLabel").innerText = L.hoursLabel;
document.getElementById("overheadLabel").innerText = L.overheadLabel;

document.getElementById("saveBtn").innerText = L.saveBtn;
document.getElementById("downloadBtn").innerText = L.downloadBtn;
document.getElementById("shareBtn").innerText = L.shareBtn;

document.getElementById("feedbackTitle").innerText = L.feedbackTitle;
document.getElementById("feedbackText").innerText = L.feedbackText;
document.getElementById("waFeedback").innerText = L.feedbackBtn1;
document.getElementById("emailFeedback").innerText = L.feedbackBtn2;

document.getElementById("communityTitle").innerText = L.communityTitle;
document.getElementById("communityText").innerText = L.communityText;

document.querySelectorAll("#skill option").forEach((o,i)=>{
o.innerText = ["Beginner","Novice","Intermediate","Advanced","Expert"][i];
});

calc();
}

function calc(){

let y = +yarn.value || 0;
let m = +materials.value || 0;
let h = +hours.value || 0;
let r = +rate.value || 0;
let o = +overhead.value || 0;
let c = currency.value || "₦";

if(y+m+h+r === 0){
output.innerText = t[lang].empty;
return;
}

let mat = y+m;
let labor = h*r;
let base = mat+labor;
let total = base + (base*o/100);

let p30 = total*1.3;
let p40 = total*1.4;
let p50 = total*1.5;
let p60 = total*1.6;
let p70 = total*1.7;

let w1 = p50*0.4;
let w2 = p50*0.5;

output.innerText = `
🧶 RESULT

Materials: ${c}${mat.toFixed(2)}
Labor: ${c}${labor.toFixed(2)}
Total: ${c}${total.toFixed(2)}

30% → ${c}${p30.toFixed(2)}
40% → ${c}${p40.toFixed(2)}

RECOMMENDED (50%)
👉 ${c}${p50.toFixed(2)}

60% → ${c}${p60.toFixed(2)}
70% → ${c}${p70.toFixed(2)}

WHOLESALE
${c}${w1.toFixed(2)} – ${c}${w2.toFixed(2)}
`;
}

document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input", calc);
});

apply();
</script>

</body>
</html>
